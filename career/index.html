<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Profile — Career</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
:root{--bg:#F9F9F8;--text:#111;--dim:#888;--light:#aaa;--border:rgba(0,0,0,0.06);--font:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font)}
body{overflow-y:auto}
body::-webkit-scrollbar{width:0}
.vc{display:flex;min-height:100%}
.vl{width:40%;position:sticky;top:0;height:100vh;display:flex;align-items:center;justify-content:flex-end;padding-right:3rem}
.yd{position:relative;min-height:10rem;display:flex;align-items:center;justify-content:flex-end;clip-path:inset(0 -200% 0 -200%)}
.yr{position:relative;width:100vw;height:100%;display:flex;align-items:center;justify-content:flex-end;padding-left:1rem}
.yt{font-size:clamp(1.75rem,5.5vw,5rem);font-weight:800;line-height:1.05;color:var(--text);letter-spacing:-0.03em;position:absolute;right:0;text-align:right;max-width:min(42vw,22rem);word-break:keep-all;transition:transform .6s cubic-bezier(.16,1,.3,1),opacity .4s ease}
.vr{flex:1;padding:50vh 2rem 50vh 0;max-width:52rem}
.ygl{font-size:.58rem;font-weight:600;color:var(--light);text-transform:uppercase;letter-spacing:.18em;padding:2.75rem 0 .85rem 0;word-break:break-word;max-width:100%}
.ygl:first-child{padding-top:0}
.vi{padding:1.25rem 0;border-bottom:1px solid var(--border);transition:opacity .3s ease,transform .3s ease;will-change:opacity,transform}
.vi:last-child{border-bottom:none}
.ic{display:flex;flex-direction:column;gap:.65rem}
.career-p{font-size:1.05rem;font-weight:400;line-height:1.65;color:var(--text)}
.career-p.dim{color:#555}
.career-h{font-size:.72rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;margin-top:.35rem}
.career-list{margin:.25rem 0 0 1.1rem;padding:0}
.career-list li{margin:.35rem 0;font-size:1.02rem;line-height:1.55;color:#222}
.career-group{margin-top:.5rem}
.career-group-title{font-size:.95rem;font-weight:700;margin-bottom:.4rem;color:var(--text)}
.tn{width:76px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;align-items:stretch;justify-content:center;flex-shrink:0}
.tt{position:relative;display:flex;flex-direction:column;align-items:stretch;justify-content:space-between;height:100vh;padding:1.5rem 0;background:#fff}
.tf{position:absolute;top:0;left:0;right:0;height:0;background:#11111170;transition:height .4s cubic-bezier(.16,1,.3,1);z-index:0}
.tl{position:absolute;top:0;bottom:0;width:1px;background:rgba(0,0,0,0.08);right:calc(.55rem + 3px);z-index:0}
.td{position:relative;z-index:1;display:flex;flex-direction:row;align-items:center;justify-content:flex-end;gap:.35rem;cursor:pointer;padding:.12rem .5rem;transition:all .3s ease}
.tdc{width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,0.15);transition:all .3s ease;flex-shrink:0;order:2}
.tdy{font-size:.62rem;font-weight:600;color:rgba(0,0,0,0.2);letter-spacing:.04em;transition:all .3s ease;white-space:nowrap;order:1;max-width:3.2rem;overflow:hidden;text-overflow:ellipsis}
.td.passed .tdy{color:rgba(255,255,255,0.72)}
.td.passed .tdc{background:rgba(255,255,255,0.45)}
.td.active .tdy{color:#fff;font-size:.78rem;font-weight:700}
.td.active .tdc{width:8px;height:8px;background:#fff}
.td:hover .tdy{color:rgba(0,0,0,0.55)}
.td.passed:hover .tdy{color:#fff}
.select-type-link{position:fixed;top:10px;left:10px;z-index:10050;font-family:var(--font);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;color:#3a3a3a;background:rgba(255,255,255,.95);border:1px solid rgba(0,0,0,.1);padding:5px 10px;border-radius:999px;box-shadow:0 1px 5px rgba(0,0,0,.08);transition:color .2s,border-color .2s,background .2s,box-shadow .2s}
.select-type-link:hover{color:#111;border-color:rgba(0,0,0,.18);background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.rule{border:0;border-top:1px solid var(--border);margin:1.25rem 0}
@media(max-width:1000px){.vc{flex-direction:column}.vl{width:100%;height:auto;min-height:6rem;padding:1.5rem 1rem 1rem;justify-content:center;position:sticky;top:0;background:var(--bg);z-index:10}.yd{min-height:5rem;width:100%;justify-content:center}.yr{width:100%;justify-content:center;padding-left:0}.yt{font-size:clamp(2rem,10vw,3.25rem);max-width:100%;text-align:center;position:relative;right:auto}.vr{width:100%;padding:1rem 1.5rem 40vh;max-width:none}.ygl{padding-top:2rem}.vi{padding:1.1rem 0}.tn{display:none}}
</style>
</head>
<body>
<a class="select-type-link" href="../index.html">Select Type</a>
<div class="vc">
<div class="vl"><div class="yd"><div class="yr" id="yr"></div></div></div>
<div class="vr" id="vr"></div>
<div class="tn" id="tn"></div>
</div>
<script>
var SECTIONS=[
{slug:'profile',nav:'Profile',left:'[PROFESSIONAL PROFILE]',blocks:[
{type:'html',html:'<p class="career-p">공공기관 디지털 서비스 및 통계 플랫폼 구축 전문가 (20+ Years Experience)</p><p class="career-p dim">국회, 한국은행, 중앙부처, 지방자치단체 등 국가 핵심기관의 디지털 서비스 구축 및 운영 프로젝트를 20년 이상 수행해 온 UI/UX 디자인, 반응형 웹 퍼블리싱, 웹 접근성 전문가입니다.</p><p class="career-p dim">특히 공공 데이터 플랫폼, 통계 시스템, 행정 서비스 포털 구축 프로젝트에 특화된 경험을 보유하고 있으며, 대규모 공공 시스템에서 UI/UX 설계, 웹 접근성 표준 구축, 서비스 운영 최적화를 수행해 왔습니다.</p><p class="career-p dim">다수의 공공기관 시스템에서 KWCAG 기반 웹 접근성 인증을 획득하며 접근성 설계 및 품질 관리 역량을 축적했습니다.</p>'}
]},
{slug:'core',nav:'Core',left:'[CORE COMPETENCIES]',blocks:[
{type:'html',html:'<div class="career-group"><p class="career-group-title">공공기관 디지털 서비스 구축</p><ul class="career-list"><li>국회, 한국은행, 중앙부처 등 국가 핵심기관 시스템 구축</li><li>대규모 행정 서비스 및 공공 포털 UI/UX 설계</li></ul></div><div class="career-group"><p class="career-group-title">통계 및 데이터 플랫폼</p><ul class="career-list"><li>국가 통계 시스템 UI/UX 설계</li><li>데이터 시각화 및 통계 서비스 인터페이스 구축</li></ul></div><div class="career-group"><p class="career-group-title">프론트엔드 퍼블리싱</p><ul class="career-list"><li>HTML5 / CSS3 기반 시맨틱 마크업</li><li>반응형 웹 퍼블리싱</li><li>웹 접근성 기반 UI 구현</li></ul></div><div class="career-group"><p class="career-group-title">웹 접근성 및 표준화</p><ul class="career-list"><li>KWCAG 2.1 기반 접근성 설계</li><li>공공기관 웹 접근성 인증 프로젝트 수행</li><li>접근성 UI 컴포넌트 및 마크업 표준 구축</li></ul></div><div class="career-group"><p class="career-group-title">대형 장기 운영 시스템</p><ul class="career-list"><li>장기 운영 공공 시스템 UI/UX 개선</li><li>서비스 운영 효율성 및 유지보수 최적화</li></ul></div>'}
]},
{slug:'clients',nav:'Clients',left:'[MAJOR CLIENTS]',blocks:[
{type:'html',html:'<p class="career-p dim">대한민국 국회 / 한국은행 / 서울특별시 / 경기도청 / 환경부 / 행정안전부 / HF한국주택금융공사 / 한국부동산원 / 국립중앙의료원 / 한국형사정책연구원 / 에너지경제연구원 / 국가보훈처 / 한국바이오협회 / 기획재정부 / TBS교통방송</p>'}
]},
{slug:'experience',nav:'Spotlight',left:'[REPRESENTATIVE EXPERIENCE]',blocks:[
{type:'html',html:'<p class="career-h">대한민국 국회 디지털 서비스 구축 및 운영</p><p class="career-p"><strong>기간</strong> · 2024 ~ 2025</p><p class="career-p"><strong>Role</strong> · UI/UX 디자인 및 퍼블리싱 총괄, 웹 접근성 설계 및 표준 구축</p><p class="career-p"><strong>Contribution</strong> · 공공 웹 접근성 표준 기반 UI 컴포넌트 설계, 공통 UI/UX 가이드 체계 구축, 디자인·개발·기획 조직 간 품질 관리</p><p class="career-p"><strong>Achievement</strong> · 국회 주요 서비스 웹 접근성 인증 획득, 공통 UI/UX 가이드 도입으로 서비스 일관성 확보, 접근성 이슈 감소 및 유지보수 효율 향상</p>'}
]},
{slug:'projects',nav:'Projects',left:'[KEY PROJECTS]',blocks:[
{type:'html',html:'<div class="career-group"><p class="career-group-title">1. 국회 시스템</p><p class="career-p dim">국회 주요 서비스 UI/UX 및 퍼블리싱 총괄 — 국회 대표 홈페이지(국문·영문·모바일), 의안정보시스템, 국민동의청원, 입법예고, 국회 통합예약, 국회뉴스ON, 헌정포털, 열린국회정보, 국회의정연수원, 국회 AI 의정지원 플랫폼</p></div><div class="career-group"><p class="career-group-title">2. 금융 및 경제 통계 시스템</p><p class="career-p dim">한국은행 스냅샷, ECOS, 채용시스템, DAS, HF 주택금융통계시스템, 한국부동산원 R-ONE, 에너지경제연구원 KESIS</p></div><div class="career-group"><p class="career-group-title">3. 공공 데이터 플랫폼</p><p class="career-p dim">서울시 열린데이터광장, 경기데이터드림, 환경통계정보시스템, 재난안전 데이터 포털</p></div><div class="career-group"><p class="career-group-title">4. 공공 의료 데이터 시스템</p><p class="career-p dim">국립중앙의료원 응급의료정보망, 응급의료 통계 포털, 시립병원 통계 시스템, 아이안심톡</p></div>'}
]},
{slug:'a11y',nav:'A11y',left:'[WEB ACCESSIBILITY CERTIFICATION PROJECTS]',blocks:[
{type:'html',html:'<p class="career-p dim">다수 공공기관 서비스에서 웹 접근성 품질인증 획득</p><p class="career-h" style="margin-top:1rem">대표 사이트</p><ul class="career-list"><li>국회 대표 홈페이지, 의안정보시스템, 입법예고 시스템</li><li>NABOSTATS 재정경제통계, HF 주택금융통계 시스템</li><li>환경부 환경통계포털, 한국부동산원 부동산 통계 시스템</li><li>국립중앙의료원 아이안심톡, 경기데이터드림, CCJS 범죄통계포털</li></ul>'}
]},
{slug:'highlights',nav:'Highlights',left:'[CAREER HIGHLIGHTS]',blocks:[
{type:'html',html:'<ul class="career-list"><li>공공기관 디지털 서비스 구축 20년 이상 경험</li><li>국회 및 국가 통계 시스템 다수 구축</li><li>웹 접근성 인증 프로젝트 다수 수행</li><li>대형 공공 데이터 플랫폼 UI/UX 설계 경험</li></ul>'}
]}
];
var cSlug=null;
function render(){
var v=document.getElementById('vr');v.innerHTML='';
SECTIONS.forEach(function(sec){
var l=document.createElement('div');l.className='ygl';l.dataset.section=sec.slug;l.textContent=sec.left;v.appendChild(l);
sec.blocks.forEach(function(b){
var d=document.createElement('div');d.className='vi';d.dataset.section=sec.slug;
var cw=document.createElement('div');cw.className='ic';cw.innerHTML=b.html;
d.appendChild(cw);v.appendChild(d);});});
rT();
var ro=document.getElementById('yr');ro.innerHTML='';
var first=document.createElement('span');first.className='yt';first.textContent=SECTIONS[0].left;ro.appendChild(first);
cSlug=SECTIONS[0].slug;
requestAnimationFrame(hS);}
function rT(){
var tn=document.getElementById('tn');tn.innerHTML='';
var tk=document.createElement('div');tk.className='tt';
var fl=document.createElement('div');fl.className='tf';fl.id='tf';tk.appendChild(fl);
var ln=document.createElement('div');ln.className='tl';tk.appendChild(ln);
SECTIONS.forEach(function(sec){
var dt=document.createElement('div');dt.className='td';dt.dataset.section=sec.slug;
var c=document.createElement('div');c.className='tdc';
var lb=document.createElement('span');lb.className='tdy';lb.textContent=sec.nav;
dt.appendChild(c);dt.appendChild(lb);
dt.addEventListener('click',function(){
var el=document.querySelector('.ygl[data-section="'+sec.slug+'"]');
if(el)window.scrollTo({top:el.offsetTop-window.innerHeight*0.35,behavior:'smooth'})});
tk.appendChild(dt);});
tn.appendChild(tk);}
function hS(){
var vh=window.innerHeight;var fz=vh*.18;var bfs=vh-fz;
var items=document.querySelectorAll('.vi');
items.forEach(function(el){var r=el.getBoundingClientRect();
if(r.top<fz&&r.top>-r.height){var pr=Math.max(0,r.top/fz);el.style.opacity=pr;el.style.transform='translateY('+(1-pr)*-12+'px)'}
else if(r.top<=-r.height){el.style.opacity=0}
else if(r.top>bfs){var pr=Math.max(0,(vh-r.top)/fz);el.style.opacity=pr;el.style.transform='translateY('+(1-pr)*12+'px)'}
else{el.style.opacity=1;el.style.transform='translateY(0)'}});
var labels=document.querySelectorAll('.ygl');
labels.forEach(function(l){var r=l.getBoundingClientRect();
if(r.top<fz&&r.top>-r.height){l.style.opacity=Math.max(0,r.top/fz)}
else if(r.top<=-r.height){l.style.opacity=0}
else if(r.top>bfs){l.style.opacity=Math.max(0,(vh-r.top)/fz)}
else{l.style.opacity=1}});
var ay=null;var gl=document.querySelectorAll('.ygl');
gl.forEach(function(l){var r=l.getBoundingClientRect();
if(r.top<vh*0.5){ay=l.dataset.section}});
if(ay===null&&gl.length>0){ay=gl[0].dataset.section}
if(ay!==null){uDisplay(ay);uTD(ay)}}
function uTD(slug){
var dots=document.querySelectorAll('.td');
var fl=document.getElementById('tf');var ad=null;
var order=SECTIONS.map(function(s){return s.slug});
var idxActive=order.indexOf(slug);
dots.forEach(function(d){var ds=d.dataset.section;
var i=order.indexOf(ds);var isA=ds===slug;var isP=i<=idxActive;
if(isA){d.classList.add('active');d.classList.add('passed');ad=d}
else{d.classList.remove('active');if(isP)d.classList.add('passed');else d.classList.remove('passed')}});
if(ad&&fl){var tk=ad.closest('.tt');var tr=tk.getBoundingClientRect();var dr=ad.getBoundingClientRect();fl.style.height=(dr.bottom-tr.top)+'px'}}
function uDisplay(slug){
var sec=SECTIONS.find(function(s){return s.slug===slug});if(!sec)return;
var label=sec.left;if(slug===cSlug)return;
var oi=cSlug!==null?SECTIONS.findIndex(function(s){return s.slug===cSlug}):0;
var ni=SECTIONS.findIndex(function(s){return s.slug===slug});
var dir=ni<oi?'up':'down';
cSlug=slug;
var ro=document.getElementById('yr');
var ex=ro.querySelectorAll('.yt');
if(ex.length>1)for(var i=0;i<ex.length-1;i++)ex[i].remove();
var old=ro.querySelector('.yt');
var nw=document.createElement('span');nw.className='yt';nw.textContent=label;
if(!old){ro.appendChild(nw);return}
var inf=dir==='up'?'110%':'-110%';
nw.style.transform='translateY('+inf+')';nw.style.opacity='0';ro.appendChild(nw);
requestAnimationFrame(function(){requestAnimationFrame(function(){
var exf=dir==='up'?'-110%':'110%';
old.style.transform='translateY('+exf+')';old.style.opacity='0';
nw.style.transform='translateY(0)';nw.style.opacity='1'})});
setTimeout(function(){if(old.parentNode)old.remove()},700)}
window.addEventListener('scroll',hS,{passive:true});
window.addEventListener('resize',function(){hS()});
render();
</script>
</body>
</html>
