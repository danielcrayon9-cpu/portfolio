<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Profile — Career</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@47,400,0,0">
<style>
    :root{--bg:#F9F9F8;--text:#111;--dim:#666;--light:#999;--border:rgba(0,0,0,0.08);--font:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;--col-left:11.5rem;--gap:15rem}
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{background:var(--bg);color:var(--text);font-family:var(--font)}
    body{overflow-y:auto;line-height:1.5}
    body.index-menu-open{overflow:hidden}
    .index-menu{position:fixed;top:1rem;left:1rem;z-index:10050}
    .index-menu__toggle{position:relative;z-index:10052;display:flex;align-items:center;justify-content:center;width:4rem;height:4rem;color:#000;background:transparent;text-decoration:none;transition:color .25s ease}
    .index-menu.is-open .index-menu__toggle{color:#000}
    .index-menu__toggle .material-symbols-outlined{font-family:"Material Symbols Outlined";font-size:47px;font-weight:400;font-style:normal;line-height:1;letter-spacing:normal;text-transform:none;white-space:nowrap;word-wrap:normal;direction:ltr;font-feature-settings:"liga";-webkit-font-feature-settings:"liga";-webkit-font-smoothing:antialiased}
    .index-menu>ul{position:fixed;top:0;right:0;bottom:0;left:0;z-index:10051;display:none;width:100%;height:100%;margin:0;padding:8rem 2.5rem 2.5rem;box-sizing:border-box;background:#fff;list-style:none}
    .index-menu.is-open>ul{display:block}
    .index-menu>ul li{display:block}
    .index-menu>ul li a{display:block;padding:1.5rem 3rem;color:#000;font-size:clamp(2.5rem,7vw,5.5rem);font-weight:500;line-height:1;text-decoration:none;transition:color .3s ease,background .3s ease}
    .index-menu>ul li a:hover{color:#fff;background:#000}
    .blind{position:absolute;overflow:hidden;width:1px;height:1px;margin:-1px;padding:0;border:0;clip:rect(0,0,0,0)}
    .page{max-width:70rem;margin:0 auto;padding:3.25rem 1.25rem 4rem}
    .sec{display:grid;grid-template-columns:var(--col-left) minmax(0,1fr);column-gap:var(--gap);row-gap:.75rem;padding:2rem 0;border-bottom:1px solid var(--border);align-items:start}
    .sec:first-of-type{padding-top:0}
    .sec:last-of-type{border-bottom:none}
    .sec-title{font-size:1.28rem;font-weight:700;letter-spacing:.05em;line-height:1.2;color:#000;text-transform:uppercase;word-break:break-word;hyphens:auto;max-width:100%;padding-right:.25rem}
    .sec-body{min-width:0}
    .ic{display:flex;flex-direction:column;gap:.65rem}
    .career-p{font-size:1.02rem;font-weight:400;line-height:1.65;color:var(--text)}
    .career-p.dim{color:#444}
    .career-h{font-size:.9rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:.55rem}
    .career-list{margin:.2rem 0 0 1.05rem;padding:0}
    .career-list li{margin:.32rem 0;font-size:1rem;line-height:1.55;color:#222}
    .career-group{margin-top:.45rem}
    .career-group-title{font-size:.92rem;font-weight:700;margin-bottom:.35rem;color:var(--text)}
    @media(max-width:1250px){
    .page{padding-left:6rem}
    }
    @media(max-width:1100px){
    :root{--col-left:minmax(0,1fr);--gap:0.5rem}
    .sec{grid-template-columns:1fr}
    .sec-title{padding-bottom:0}
    }
    @media(max-width:640px){
    .index-menu{top:.75rem;left:.75rem}
    .page{padding:6rem 1.25rem 4rem}
    }
</style>
</head>

<script>
(function(){
var menu=document.querySelector('.index-menu');
var toggle=menu&&menu.querySelector('.index-menu__toggle');
var icon=toggle&&toggle.querySelector('.material-symbols-outlined');
var label=toggle&&toggle.querySelector('.blind');
if(!menu||!toggle||!icon)return;
function setMenuOpen(isOpen){
menu.classList.toggle('is-open',isOpen);
document.body.classList.toggle('index-menu-open',isOpen);
toggle.setAttribute('aria-expanded',isOpen?'true':'false');
icon.textContent=isOpen?'close':'menu';
if(label)label.textContent=isOpen?'메뉴 닫기':'메뉴 열기';
}
toggle.addEventListener('click',function(e){e.preventDefault();setMenuOpen(!menu.classList.contains('is-open'))});
menu.querySelectorAll('ul a').forEach(function(link){link.addEventListener('click',function(){setMenuOpen(false)})});
window.addEventListener('keydown',function(e){if(e.key==='Escape'&&menu.classList.contains('is-open')){setMenuOpen(false);toggle.focus()}});
})();

var main=document.getElementById('main');
SECTIONS.forEach(function(sec){
var s=document.createElement('section');
s.className='sec';
var h=document.createElement('h2');
h.className='sec-title';
h.textContent=sec.left;
var bd=document.createElement('div');
bd.className='sec-body';
var inner=document.createElement('div');
inner.className='ic';
sec.blocks.forEach(function(html){inner.insertAdjacentHTML('beforeend',html);});
bd.appendChild(inner);
s.appendChild(h);
s.appendChild(bd);
main.appendChild(s);
});
